<!DOCTYPE html>
<html lang="ta">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>404 - Page Not Found</title>
  <link rel="shortcut icon" href="icon.png" type="image/x-icon">

  <meta name="robots" content="noindex">

  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<style>

/* ===== Reset ===== */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Inter, sans-serif;
}

body{
  background:#f6f8fb;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  color:#333;
}

/* ===== Card ===== */
.error-box{
  background:#fff;
  padding:50px 30px;
  border-radius:14px;
  box-shadow:0 8px 25px rgba(0,0,0,.08);
  max-width:450px;
  width:95%;
}

/* 404 number */
.error-code{
  font-size:80px;
  font-weight:800;
  color:#dc143b;
  margin-bottom:10px;
}

/* text */
h2{
  margin-bottom:10px;
}

p{
  font-size:14px;
  color:#666;
  margin-bottom:25px;
}

/* button */
.home-btn{
  display:inline-block;
  padding:10px 22px;
  background:#0c0f38;
  color:white;
  border-radius:6px;
  text-decoration:none;
  font-size:14px;
  transition:.2s;
}

.home-btn:hover{
  background:#dc143b;
}

/* icon */
.icon{
  font-size:40px;
  color:#dc143b;
  margin-bottom:15px;
}

</style>
</head>

<body>

  <div class="error-box">

    <div class="icon">
      <i class="fa fa-search"></i>
    </div>

    <div class="error-code">404</div>

    <h2>பக்கம் கிடைக்கவில்லை</h2>

    <p>
      நீங்கள் தேடிய பக்கம் இல்லை அல்லது மாற்றப்பட்டுள்ளது.  
      தயவுசெய்து Home பக்கத்திற்கு திரும்பவும்.
    </p>

    <a href="index.html" class="home-btn">
      <i class="fa fa-home"></i> Go to Home
    </a>

  </div>

  <footer style="position:fixed;bottom:10px;width:100%;font-size:12px;color:#888;">
    © 2026 MC Finance | Powered by MC Digital Group
  </footer>

</body>
</html>
