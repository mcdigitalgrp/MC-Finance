<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Contact Us</title>
<link rel="shortcut icon" href="icon.png" type="image/x-icon">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<style>

/* ===== Reset ===== */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Inter, sans-serif;
}

body{
  background:#f6f8fb;
  color:#333;
}

/* ===== Header ===== */
header{
  padding:15px 20px;
  display:flex;
  align-items:center;
  gap:15px;
  background:#fff;
  box-shadow:0 2px 8px rgba(0,0,0,.05);
}

header h2{
  color:#dc143b;
}

/* ===== Container ===== */
.container{
  max-width:500px;
  margin:40px auto;
  background:#fff;
  padding:25px;
  border-radius:10px;
  box-shadow:0 5px 15px rgba(0,0,0,.06);
}

/* ===== Form ===== */
input, textarea{
  width:100%;
  padding:10px;
  margin-top:8px;
  margin-bottom:15px;
  border:1px solid #ddd;
  border-radius:6px;
  font-size:14px;
}

textarea{
  resize:none;
  height:120px;
}

button{
  width:100%;
  padding:10px;
  border:none;
  background:#0c0f38;
  color:#fff;
  border-radius:6px;
  cursor:pointer;
  font-size:14px;
}

button:hover{
  background:#dc143b;
}

footer{
  text-align:center;
  margin-top:40px;
  padding:15px;
  background:#222;
  color:#bbb;
  font-size:13px;
}

</style>
</head>

<body>

<header>
  <a href="index.html"><i class="fa fa-arrow-left"></i></a>
  <h2>Contact Us</h2>
</header>


<div class="container">

  <!-- ⭐ FormSubmit service -->
  ```html
<form onsubmit="sendMail(event)">
  <input type="text" id="name" placeholder="Name" required>
  <input type="email" id="email" placeholder="Email" required>
  <textarea id="msg" placeholder="Message" required></textarea>
  <button type="submit">Send</button>
</form>




</div>


<footer>
© 2026 MC Finance | All Rights Reserved
</footer>
<script>
function sendMail(e){
  e.preventDefault();

  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const msg = document.getElementById("msg").value;

  const subject = "Website Contact Form";
  const body = `Name: ${name}%0AEmail: ${email}%0AMessage: ${msg}`;

  window.location.href =
    `mailto:historyishere01@gmail.com?subject=${subject}&body=${body}`;
}
</script>
</body>

</html>
